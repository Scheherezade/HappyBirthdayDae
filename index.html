<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Glene 🎂</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
margin:0;
height:100vh;
background:#ffd6d6;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
overflow:hidden;
text-align:center;
}

/* MAIN CURTAIN */

.curtain{
position:fixed;
top:0;
width:50%;
height:100%;
z-index:10;
transition:2s ease;

background:
repeating-linear-gradient(
90deg,
#8b0024,
#8b0024 40px,
#a3002c 40px,
#a3002c 80px
);

box-shadow:
inset -10px 0 20px rgba(0,0,0,0.3),
inset 10px 0 20px rgba(0,0,0,0.3);
}

.curtain::after{
content:"";
position:absolute;
bottom:0;
left:0;
width:100%;
height:80px;

background:
radial-gradient(circle at 40px 0px,#8b0024 40px,transparent 41px) repeat-x;

background-size:80px 80px;
}

.left-curtain{left:0;}
.right-curtain{right:0;}

.open-left{transform:translateX(-100%);}
.open-right{transform:translateX(100%);}

/* TOP DECORATIVE CURTAINS */

.top-curtain{
position:fixed;
top:-20px;
width:220px;
height:130px;
background:repeating-linear-gradient(
90deg,
#8b0024,
#8b0024 20px,
#a3002c 20px,
#a3002c 40px
);
border-bottom-left-radius:120px;
border-bottom-right-radius:120px;
box-shadow:0 10px 20px rgba(0,0,0,0.25);
z-index:1;
animation:swing 4s ease-in-out infinite;
}

.top-left-curtain{
left:0;
transform-origin:top left;
}

.top-right-curtain{
right:0;
transform-origin:top right;
}

/* Swing animation */

@keyframes swing{
0%{transform:rotate(0deg);}
50%{transform:rotate(2deg);}
100%{transform:rotate(0deg);}
}

/* Title */

h1{
color:#d6003d;
margin-bottom:5px;
z-index:2;
}

.subtitle{
color:#444;
margin-bottom:30px;
font-size:16px;
z-index:2;
}

/* Gallery */

.gallery{
width:90%;
max-width:900px;
display:flex;
justify-content:center;
align-items:center;
gap:25px;
z-index:2;
}

.card{
transition:0.5s;
text-align:center;
}

.card img{
width:200px;
height:260px;
object-fit:cover;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.active{
transform:scale(1.2);
filter:blur(0);
}

.side{
filter:blur(4px) brightness(0.8);
transform:scale(0.9);
}

/* message */

.message{
margin-top:12px;
font-size:15px;
color:#333;
max-width:200px;
}

/* Floating emojis */

.particle{
position:fixed;
font-size:22px;
pointer-events:none;
animation:floatUp linear forwards;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

/* Confetti */

.confetti{
position:fixed;
width:8px;
height:8px;
animation:confettiFall 2s linear forwards;
}

@keyframes confettiFall{
0%{transform:translateY(-20px) rotate(0deg);}
100%{transform:translateY(100vh) rotate(720deg);opacity:0;}
}

/* Balloons */

.balloon{
position:fixed;
font-size:30px;
animation:balloonRise linear forwards;
pointer-events:none;
}

@keyframes balloonRise{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

/* Sparkle trail */

.sparkle{
position:fixed;
font-size:14px;
pointer-events:none;
animation:sparkleFade 1s linear forwards;
}

@keyframes sparkleFade{
0%{transform:scale(1);opacity:1;}
100%{transform:scale(2);opacity:0;}
}

</style>
</head>
<body>

<!-- Decorative top curtains -->
<div class="top-curtain top-left-curtain"></div>
<div class="top-curtain top-right-curtain"></div>

<!-- Opening curtain -->
<div class="curtain left-curtain" id="curtainLeft"></div>
<div class="curtain right-curtain" id="curtainRight"></div>

<h1>Happy Birthday Gorgeous 🎂</h1>
<div class="subtitle">
Today is all about celebrating you ❤️
</div>

<div class="gallery">
<div class="card side" id="prev"></div>
<div class="card active" id="current"></div>
<div class="card side" id="next"></div>
</div>

<script>

const images=[
{src:"pic1.jfif",msg:"Happy 24th Birthday Glene! May your day be as beautiful as the grace you show others every day."},
{src:"pic2.jfif",msg:"Every moment with you becomes a beautiful memory."},
{src:"pic3.jfif",msg:"I’m grateful for your kindness and the joy you bring."},
{src:"pic4.jfif",msg:"You deserve all the love and happiness today."},
{src:"pic5.jfif",msg:"Life feels brighter whenever you're around."},
{src:"pic6.jfif",msg:"Thank you for being someone truly special."},
{src:"pic7.jfif",msg:"May your birthday be filled with laughter and smiles."},
{src:"pic8.jfif",msg:"Here’s to more memories and amazing moments ahead."}
];

let index=0;

const prev=document.getElementById("prev");
const current=document.getElementById("current");
const next=document.getElementById("next");

function updateGallery(){

let prevIndex=(index-1+images.length)%images.length;
let nextIndex=(index+1)%images.length;

prev.innerHTML=`<img src="${images[prevIndex].src}"><div class="message">${images[prevIndex].msg}</div>`;
current.innerHTML=`<img src="${images[index].src}"><div class="message">${images[index].msg}</div>`;
next.innerHTML=`<img src="${images[nextIndex].src}"><div class="message">${images[nextIndex].msg}</div>`;

}

updateGallery();

setInterval(()=>{
index=(index+1)%images.length;
updateGallery();
},4000);

/* floating emojis */

const emojis=["🎈","🎉","🎂","✨","💖","🥳"];

function createParticle(){
const p=document.createElement("div");
p.classList.add("particle");

p.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];
p.style.left=Math.random()*100+"vw";
p.style.bottom="-20px";
p.style.animationDuration=(6+Math.random()*4)+"s";

document.body.appendChild(p);
setTimeout(()=>p.remove(),10000);
}

setInterval(createParticle,800);

/* confetti */

function startConfetti(){

for(let i=0;i<120;i++){

const c=document.createElement("div");
c.classList.add("confetti");

c.style.left=Math.random()*100+"vw";

const colors=["#ff4d6d","#ffd166","#06d6a0","#118ab2","#ef476f"];
c.style.background=colors[Math.floor(Math.random()*colors.length)];

c.style.animationDuration=(1+Math.random()*1.5)+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),2000);

}
}

/* curtain opening */

window.onload=function(){

setTimeout(()=>{

document.getElementById("curtainLeft").classList.add("open-left");
document.getElementById("curtainRight").classList.add("open-right");

startConfetti();

},1200);

}

/* balloons */

function createBalloon(){

const balloon=document.createElement("div");
balloon.classList.add("balloon");

balloon.innerHTML="🎈";

balloon.style.left=Math.random()*100+"vw";
balloon.style.bottom="-40px";
balloon.style.animationDuration=(6+Math.random()*4)+"s";

document.body.appendChild(balloon);

setTimeout(()=>balloon.remove(),10000);

}

setInterval(createBalloon,1200);

/* sparkle trail */

function createSparkle(x,y){

const s=document.createElement("div");
s.classList.add("sparkle");

const hearts=["💖","✨","💕"];

s.innerHTML=hearts[Math.floor(Math.random()*hearts.length)];

s.style.left=x+"px";
s.style.top=y+"px";

document.body.appendChild(s);

setTimeout(()=>s.remove(),1000);

}

document.addEventListener("mousemove",(e)=>{
createSparkle(e.clientX,e.clientY);
});

document.addEventListener("touchmove",(e)=>{
const touch=e.touches[0];
createSparkle(touch.clientX,touch.clientY);
});

</script>

</body>
</html>
